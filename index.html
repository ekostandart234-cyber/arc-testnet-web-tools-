<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Testnet Web Tools</title>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.59.0/build/stlite.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.59.0/build/stlite.css">
    <style>
        body { margin: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        stlite.mount({
            entrypoint: "app.py",
            files: {
                "app.py": `
import streamlit as st

st.set_page_config(page_title="Arc Testnet Web Tools", page_icon="🌐", layout="wide")

st.title("🌐 Arc Testnet Web Tools")
st.markdown("**Smart Contract Deployment Tool for Arc Testnet**")

# Sidebar
st.sidebar.header("🔗 Wallet")
if st.sidebar.button("Connect MetaMask", type="primary"):
    st.sidebar.success("MetaMask connected (demo)")

st.sidebar.metric("Network", "Arc Testnet")
st.sidebar.metric("Chain ID", "5042002")
st.sidebar.markdown("[🔎 Explorer](https://testnet.arcscan.app)")

# Tabs
tab1, tab2, tab3 = st.tabs(["💰 Send USDC", "📦 Batch Send", "📜 Deploy Contract"])

with tab3:
    st.subheader("📜 Deploy Smart Contract")
    
    category = st.selectbox("Select Category", [
        "Counters", "ERC-20 Tokens", "NFT", "Utilities"
    ])
    
    if category == "Counters":
        contract_name = st.selectbox("Select Contract", ["Simple Counter", "Improved Counter"])
    elif category == "ERC-20 Tokens":
        contract_name = st.selectbox("Select Contract", ["Simple ERC20", "ERC20 with Mint"])
    elif category == "NFT":
        contract_name = st.selectbox("Select Contract", ["Basic ERC721"])
    else:
        contract_name = st.selectbox("Select Contract", ["Ownable"])

    # Contracts
    contracts = {
        "Simple Counter": """pragma solidity ^0.8.20;
contract Counter {
    uint256 public count = 0;
    function increment() public { count += 1; }
    function decrement() public { if (count > 0) count -= 1; }
    function getCount() public view returns (uint256) { return count; }
}""",

        "Improved Counter": """pragma solidity ^0.8.20;
contract ImprovedCounter {
    uint256 public count = 0;
    address public owner;
    
    constructor() { owner = msg.sender; }
    
    modifier onlyOwner() { require(msg.sender == owner, "Not owner"); _; }
    
    function increment() public {
        count += 1;
    }
}""",

        "Simple ERC20": """pragma solidity ^0.8.20;
contract SimpleERC20 {
    string public name = "Arc Test Token";
    string public symbol = "ARCT";
    uint8 public decimals = 18;
    uint256 public totalSupply;
    mapping(address => uint256) public balanceOf;

    constructor(uint256 initialSupply) {
        totalSupply = initialSupply * 10**18;
        balanceOf[msg.sender] = totalSupply;
    }

    function transfer(address to, uint256 amount) public returns (bool) {
        require(balanceOf[msg.sender] >= amount, "Insufficient balance");
        balanceOf[msg.sender] -= amount;
        balanceOf[to] += amount;
        return true;
    }
}"""
    };

    code = contracts.get(contract_name, "// Contract not found")
    st.code(code, language="solidity")

    if st.button("🚀 Deploy Contract", type="primary"):
        st.success(f"✅ Contract **{contract_name}** is ready!")
        st.info("MetaMask integration coming soon")

with tab1:
    st.info("USDC sending will be added soon")

st.divider()
st.caption("🔧 Arc Testnet Web Tools • Community Project")
                `
            },
            requirements: [],
            theme: "dark"
        })
    </script>
</body>
</html>
