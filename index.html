<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arc Testnet Web Tools</title>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.60.0/build/stlite.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.60.0/build/stlite.css">
</head>
<body>
    <div id="root"></div>

    <script>
        stlite.mount({
            entrypoint: "app.py",
            files: {
                "app.py": `
import streamlit as st

st.set_page_config(page_title="Arc Testnet Web Tools", page_icon="🌐", layout="wide")

st.title("🌐 Arc Testnet Web Tools")
st.markdown("**Convenient deployment tool for Arc Testnet**")

# ===================== CONFIG =====================
CHAIN_ID = 5042002
EXPLORER = "https://testnet.arcscan.app"

st.sidebar.header("🔗 Wallet")
if st.sidebar.button("Connect MetaMask", type="primary"):
    st.sidebar.success("MetaMask connected (demo)")

st.sidebar.metric("Network", "Arc Testnet")
st.sidebar.metric("Chain ID", CHAIN_ID)
st.sidebar.markdown(f"[🔎 Explorer]({EXPLORER})")

tab1, tab2, tab3, tab4 = st.tabs(["💰 Send USDC", "📦 Batch Send", "📜 Deploy Contract", "📊 Info"])

with tab3:
    st.subheader("📜 Deploy Smart Contract")
    
    category = st.selectbox("Select Category", [
        "Counters", "ERC-20 Tokens", "NFT (ERC721)", "DeFi", "Utilities", "Other"
    ])
    
    if category == "Counters":
        contract_name = st.selectbox("Select Contract", [
            "Simple Counter", "Improved Counter", "Resetable Counter"
        ])
    elif category == "ERC-20 Tokens":
        contract_name = st.selectbox("Select Contract", [
            "Simple ERC20", "ERC20 with Mint", "ERC20 with Burn & Mint", "ERC20 with Tax"
        ])
    elif category == "NFT (ERC721)":
        contract_name = st.selectbox("Select Contract", [
            "Basic ERC721", "ERC721 with Metadata", "Limited NFT Collection"
        ])
    elif category == "DeFi":
        contract_name = st.selectbox("Select Contract", [
            "Simple Staking", "Vesting Contract", "Liquidity Pool Mock"
        ])
    elif category == "Utilities":
        contract_name = st.selectbox("Select Contract", [
            "Ownable", "Pausable", "Timelock Controller", "Merkle Distributor"
        ])
    else:
        contract_name = st.selectbox("Select Contract", ["Hello World"])

    # ================== CONTRACTS ==================
    contracts = {
        "Simple Counter": """pragma solidity ^0.8.20;
contract Counter {
    uint256 public count;
    function increment() public { count += 1; }
    function decrement() public { count -= 1; }
    function getCount() public view returns (uint256) { return count; }
}""",

        "Improved Counter": """pragma solidity ^0.8.20;
contract ImprovedCounter {
    uint256 public count;
    address public owner;
    
    event Incremented(address indexed user, uint256 newCount);
    
    constructor() { owner = msg.sender; }
    
    modifier onlyOwner() { require(msg.sender == owner, "Not owner"); _; }
    
    function increment() public {
        count += 1;
        emit Incremented(msg.sender, count);
    }
}""",

        "Simple ERC20": """pragma solidity ^0.8.20;
contract SimpleERC20 {
    string public name = "Arc Test Token";
    string public symbol = "ARCT";
    uint8 public decimals = 18;
    uint256 public totalSupply;
    mapping(address => uint256) public balanceOf;

    constructor(uint256 initialSupply) {
        totalSupply = initialSupply * 10**18;
        balanceOf[msg.sender] = totalSupply;
    }

    function transfer(address to, uint256 amount) public returns (bool) {
        require(balanceOf[msg.sender] >= amount, "Not enough tokens");
        balanceOf[msg.sender] -= amount;
        balanceOf[to] += amount;
        return true;
    }
}""",

        "ERC20 with Mint": """pragma solidity ^0.8.20;
contract MintableERC20 {
    string public name = "Arc Mint Token";
    string public symbol = "ARCM";
    uint8 public decimals = 18;
    uint256 public totalSupply;
    address public owner;
    mapping(address => uint256) public balanceOf;

    constructor() { owner = msg.sender; }

    modifier onlyOwner() { require(msg.sender == owner); _; }

    function mint(address to, uint256 amount) public onlyOwner {
        totalSupply += amount;
        balanceOf[to] += amount;
    }
}""",

        "Basic ERC721": """pragma solidity ^0.8.20;
contract BasicNFT {
    string public name = "Arc NFTs";
    string public symbol = "ARCNFT";
    mapping(uint256 => address) public ownerOf;
    uint256 public nextTokenId;

    function mint() public {
        ownerOf[nextTokenId] = msg.sender;
        nextTokenId++;
    }
}"""
    };

    code = contracts.get(contract_name, "// Contract under development")
    st.code(code, language="solidity")

    col1, col2 = st.columns(2)
    with col1:
        if st.button("🚀 Deploy Contract", type="primary", use_container_width=True):
            st.success(f"✅ Contract **{contract_name}** is ready!")
            st.info("MetaMask integration will be added in the next version")
    with col2:
        st.link_button("Open Explorer", EXPLORER)

with tab1:
    st.subheader("Send USDC")
    st.info("This section is under development")

st.divider()
st.caption("🔧 Arc Testnet Web Tools • Open tool for the community")
                `
            },
            requirements: ["web3==6.20.0"],
            theme: "dark"
        })
    </script>
</body>
</html>
